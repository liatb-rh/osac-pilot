name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (static mode)
        # continue-on-error: the Nitro v3 pre-RC SSR bundle build step fails with
        # "rollupOptions.input should not be an html file" after prerender has already
        # written index.html + assets to .output/public. We capture the exit code and
        # fail later if the expected output is missing.
        continue-on-error: true
        id: build
        run: npm run build
        env:
          VITE_BASE_URL: '/osac-pilot/'

      - name: Verify build output
        run: |
          if [ ! -f .output/public/index.html ]; then
            echo "::error::index.html not found in .output/public — build may have failed before prerender"
            ls -lR .output/ 2>/dev/null || true
            exit 1
          fi
          echo "index.html found, proceeding with deployment"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
