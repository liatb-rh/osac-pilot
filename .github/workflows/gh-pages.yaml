name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (static mode)
        run: npm run build
        env:
          VITE_BASE_URL: '/osac-pilot/'

      - name: Locate build output
        id: locate
        run: |
          if [ -f dist/index.html ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
          elif [ -f .output/public/index.html ]; then
            echo "dir=.output/public" >> "$GITHUB_OUTPUT"
          else
            echo "=== dist/ ===" && ls -la dist/ 2>/dev/null || true
            echo "=== .output/public/ ===" && ls -la .output/public/ 2>/dev/null || true
            echo "::error::Could not find index.html in dist/ or .output/public/"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.dir }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
